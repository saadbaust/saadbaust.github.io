  </head>
  <body>
    <main class="main-block">
      <aside class="sidebar">
        <nav class="sticky-nav">
          <div class="nav-group">
            <small class="nav-label">Main</small>
            <a href="index.html">Home</a>
            <a href="gallery.html" class="active">Gallery</a>
          </div>
          <div class="nav-group">
            <small class="nav-label">Home Sections</small>
            <a href="index.html#experience">Experience</a>
            <a href="index.html#journals">Publications</a>
            <a href="index.html#education">Education</a>
            <a href="index.html#skills">Skills</a>
            <a href="index.html#contact">Contact</a>
          </div>
        </nav>
      </aside>

      <div class="content">
        <header class="hero" style="margin-bottom: 1rem;">
          <div class="hero-info">
            <h1>Gallery</h1>
            <p class="subtitle">Saad Ahmed</p>
            <p class="institution">Bangladesh Army University of Science and Technology (BAUST)</p>
          </div>
        </header>

        <hr class="divider" />

        <section id="gallery">
          <h2 class="section-title">Photos</h2>
          <div class="gallery-container" id="gallery-grid">
            <!-- Gallery items rendered here -->
          </div>
        </section>

        <footer>
          <p>&copy; 2026 Saad Ahmed • BAUST, Saidpur</p>
        </footer>
      </div>
    </main>

    <button id="back-to-top" title="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      <i class="fas fa-arrow-up"></i>
    </button>

    <script>
      // Add your gallery image paths here
      const galleryImages = [
        // { src: "images/gallery/photo1.jpg", alt: "Description" },
        // { src: "images/gallery/photo2.jpg", alt: "Description" },
      ];

      function renderGallery() {
        const grid = document.getElementById("gallery-grid");
        if (galleryImages.length === 0) {
          grid.innerHTML = '<p style="color:var(--gray); font-size:0.95rem;">Photos coming soon.</p>';
          return;
        }
        galleryImages.forEach(img => {
          grid.innerHTML += `
            <div class="gallery-item">
              <img src="${img.src}" alt="${img.alt}" loading="lazy" />
            </div>`;
        });
      }

      window.onload = renderGallery;

      // Back to top
      const backToTop = document.getElementById('back-to-top');
      window.addEventListener('scroll', () => {
        backToTop.classList.toggle('visible', window.scrollY > 300);
      });
    </script>
  </body>
</html>

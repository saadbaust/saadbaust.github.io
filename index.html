    <script>
      // Your specific CSV link (converted from pubhtml to pub?output=csv)
      const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_lDeiXkSj2LmJz4HSfyUQN3EQdU6QkFDOesBYUvrV0GIjA8VzGUckl5s8-S3u3u5CmnDWrjPJ1N8a/pub?output=csv";

      async function fetchAndRender() {
        try {
          const response = await fetch(SHEET_CSV_URL);
          const csvData = await response.text();
          
          // Split data by finding the start of new entries (@ or STATS:)
          const entries = csvData.split(/(?=@|STATS:)/g);
          let bibtexEntries = [];

          entries.forEach(item => {
            let cleanItem = item.trim()
                .replace(/^"|"$/g, '') // Remove wrapping quotes
                .replace(/""/g, '"');  // Fix double quotes

            if (cleanItem.startsWith("STATS:")) {
              const statsLine = cleanItem.split('\n')[0];
              const parts = statsLine.replace("STATS:", "").split(",");
              document.getElementById("total-citations").innerText = parts[0] || "0";
              document.getElementById("h-index").innerText = parts[1] || "0";
              document.getElementById("i10-index").innerText = parts[2] || "0";
            } else if (cleanItem.startsWith("@")) {
              bibtexEntries.push(cleanItem);
            }
          });

          renderPapers(bibtexEntries);
        } catch (err) {
          console.error("Error loading data:", err);
        }
      }

      function renderPapers(bibtexArray) {
        const journalList = document.getElementById("journal-list");
        const conferenceList = document.getElementById("conference-list");
        
        journalList.innerHTML = "";
        conferenceList.innerHTML = "";

        const processed = bibtexArray.map((bib, index) => {
          const isJournal = bib.toLowerCase().startsWith("@article");
          const title = bib.match(/title\s*=\s*\{+(.*?)\}+/is)?.[1] || "Untitled";
          const authors = (bib.match(/author\s*=\s*\{+(.*?)\}+/is)?.[1] || "Unknown").split(/\s+and\s+/i).join(", ");
          const venue = bib.match(/(journal|booktitle)\s*=\s*\{+(.*?)\}+/is)?.[2] || "Venue";
          const year = bib.match(/year\s*=\s*\{?(\d{4})\}?/i)?.[1] || "0";
          
          const doiMatch = bib.match(/doi\s*=\s*\{+(.*?)\}+/is);
          const doi = doiMatch ? (doiMatch[1].startsWith('http') ? doiMatch[1] : `https://doi.org/${doiMatch[1]}`) : null;

          return { bib, isJournal, title, authors, venue, year: parseInt(year), doi, id: index };
        }).sort((a, b) => b.year - a.year);

        processed.forEach(p => {
          const html = `
            <div class="paper">
              <h3 class="paper-title">${p.title}</h3>
              <p class="authors">${p.authors}</p>
              <p class="venue">${p.venue}, ${p.year}</p>
              <div class="paper-actions">
                ${p.doi ? `<a href="${p.doi}" target="_blank" class="doi-link"><i class="fas fa-link"></i> DOI</a>` : ''}
                <button class="btn-cite" onclick="toggleBib('bib-${p.id}')"><i class="fas fa-quote-right"></i> BibTeX</button>
              </div>
              <pre id="bib-${p.id}" class="bibtex-box">${p.bib.trim()}</pre>
            </div>`;
          
          if (p.isJournal) journalList.innerHTML += html;
          else conferenceList.innerHTML += html;
        });
      }

      function toggleBib(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
      }

      window.onload = fetchAndRender;
    </script>

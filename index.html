<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saad Ahmed | Lecturer & Researcher | BAUST</title>
    <meta name="description" content="Official portfolio of Saad Ahmed, Lecturer at BAUST." />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      .bibtex-box { display: none; background: #f9f9f9; padding: 12px; font-size: 0.85rem; border-radius: 6px; overflow-x: auto; margin-top: 10px; border: 1px solid #eee; font-family: 'Courier New', Courier, monospace; }
      .paper { margin-bottom: 2.5rem; }
      .paper-title { color: #1a1a1a; margin-bottom: 0.4rem; font-weight: 600; line-height: 1.3; }
      .venue { font-style: italic; color: #666; margin-top: 4px; }
      .authors { color: #444; font-size: 0.95rem; }
      .paper-actions { margin-top: 10px; display: flex; gap: 15px; }
      .doi-link, .btn-cite { cursor: pointer; text-decoration: none; font-size: 0.85rem; color: #007bff; background: none; border: none; padding: 0; font-family: inherit; }
      .doi-link:hover, .btn-cite:hover { text-decoration: underline; color: #0056b3; }
    </style>
  </head>
  <body>
    <main class="main-block">
      <aside class="sidebar">
        <nav>
          <a href="index.html">Home</a>
          <a href="gallery.html">Gallery</a> 
        </nav>
      </aside>

      <div class="content">
        <header id="about" class="hero">
          <img src="images/formal.png" alt="Saad Ahmed" class="profile-circle" />
          <div class="hero-info">
            <h1>Saad Ahmed</h1>
            <p class="subtitle">Lecturer, Dept of CSE</p>
            <p class="institution">Bangladesh Army University of Science and Technology (BAUST)</p>

            <div class="metrics-container">
              <div class="metric-item">
                <span class="metric-value" id="total-citations">0</span>
                <span class="metric-label">Citations</span>
              </div>
              <div class="metric-item">
                <span class="metric-value" id="h-index">0</span>
                <span class="metric-label">h-index</span>
              </div>
            </div>

            <div class="research-interests">
              <p><strong>Research Interests:</strong> Image Processing, Computer Vision, and Deep Learning.</p>
            </div>

            <div class="social-icons">
              <a href="https://github.com/saadbaust" class="icon github"><i class="fab fa-github"></i></a>
              <a href="https://scholar.google.com/citations?user=QFARjNcAAAAJ" class="icon scholar"><i class="fas fa-graduation-cap"></i></a>
            </div>
          </div>
        </header>

        <hr class="divider" />

        <section id="journals">
          <h2 class="section-title">Journal Articles</h2>
          <div id="journal-list"></div>
        </section>

        <section id="conferences">
          <h2 class="section-title">Conference Proceedings</h2>
          <div id="conference-list"></div>
        </section>

        <footer>
          <p>&copy; 2026 Saad Ahmed • BAUST, Saidpur</p>
        </footer>
      </div>
    </main>

    <script src="papers.js"></script>
    <script>
      function renderContent() {
        if (typeof scholarStats !== 'undefined') {
          document.getElementById("total-citations").innerText = scholarStats.citations;
          document.getElementById("h-index").innerText = scholarStats.hIndex;
        }

        const journalContainer = document.getElementById("journal-list");
        const conferenceContainer = document.getElementById("conference-list");

        const processedPapers = myPapers.map((p, index) => {
          const bib = p.bibtex.trim();
          
          // Helper to extract fields from BibTeX
          const getField = (field) => {
            const regex = new RegExp(`${field}\\s*=\\s*\\{+([\\s\\S]*?)\\}+`, 'i');
            const match = bib.match(regex);
            return match ? match[1].replace(/[\{\}]/g, "").trim() : "";
          };

          const title = getField('title') || "Untitled Paper";
          const venue = getField('journal') || getField('booktitle') || "Venue Unknown";
          const authors = getField('author').split(" and ").join(", ");
          const year = getField('year');
          const doiValue = getField('doi');
          const isJournal = bib.toLowerCase().startsWith("@article");

          return { title, authors, venue, year, doiValue, bib, isJournal, index };
        }).sort((a, b) => b.year - a.year);

        processedPapers.forEach((paper) => {
          const doiHtml = paper.doiValue 
            ? `<a href="https://doi.org/${paper.doiValue}" target="_blank" class="doi-link"><i class="fas fa-link"></i> DOI Link</a>` 
            : "";

          const html = `
            <div class="paper">
                <h3 class="paper-title">${paper.title}</h3>
                <p class="authors">${paper.authors}</p>
                <p class="venue">${paper.venue}, ${paper.year}</p>
                <div class="paper-actions">
                    ${doiHtml}
                    <button class="btn-cite" onclick="toggleBib('bib-${paper.index}')"><i class="fas fa-quote-right"></i> BibTeX</button>
                </div>
                <pre id="bib-${paper.index}" class="bibtex-box">${paper.bib}</pre>
            </div>
          `;
          if (paper.isJournal) journalContainer.innerHTML += html;
          else conferenceContainer.innerHTML += html;
        });
      }

      function toggleBib(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
      }
      window.onload = renderContent;
    </script>
  </body>
</html>

    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark-theme');
            }
        })();

                    <div class="social-icons">

                        <a href="#" class="icon linkedin"><i class="fab fa-linkedin"></i></a>

            <footer>

            </footer>
        </div>
    </main>

    <script src="papers.js"></script>
    <script>
        const btn = document.getElementById("theme-button");
        const icon = btn.querySelector("i");
        const root = document.documentElement;

        // Function to update icon
        function updateIcon() {
            if (root.classList.contains("dark-theme")) {
                icon.classList.replace("fa-moon", "fa-sun");
            } else {
                icon.classList.replace("fa-sun", "fa-moon");
            }
        }

        // Initial icon check
        updateIcon();

        btn.addEventListener("click", () => {
            root.classList.toggle("dark-theme");
            const isDark = root.classList.contains("dark-theme");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            updateIcon();
        });

        function renderContent() {
            document.getElementById('total-citations').innerText = scholarStats.citations;
            document.getElementById('h-index').innerText = scholarStats.hIndex;
            document.getElementById('i10-index').innerText = scholarStats.i10Index;
            const jList = document.getElementById('journal-list');
            const cList = document.getElementById('conference-list');
            myPapers.forEach((paper, index) => {
                const isJ = paper.bibtex.trim().toLowerCase().startsWith('@article');
                const title = paper.bibtex.match(/title\s*=\s*\{+(.*?)\}+/i)?.[1] || "Untitled";
                const html = `<div class="paper"><h3 class="paper-title">${title}</h3><div class="paper-actions"><a href="${paper.doi}" target="_blank" class="doi-link">DOI</a><button class="btn-cite" onclick="toggleBib('bib-${index}')">BibTeX</button></div><pre id="bib-${index}" class="bibtex-box">${paper.bibtex.trim()}</pre></div>`;
                if (isJ) jList.innerHTML += html; else cList.innerHTML += html;
            });
        }
        function toggleBib(id) { const el = document.getElementById(id); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        window.onload = renderContent;
    </script>
</body>
</html>
